# docker-compose.yml
version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: stock_db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: stock_backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/stock_app
      - PORT=5001
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: stock_frontend
    restart: unless-stopped
    ports:
      - "80:80" # VPS'in 80 portunu dış dünyaya açıyoruz
    depends_on:
      - backend

volumes:
  mongo_data:
